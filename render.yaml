services:
  - type: web
    name: ruralnexus-cms
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    # --include=dev is required because NODE_ENV=production below would
    # otherwise skip devDependencies, and Next.js needs typescript +
    # @types/* at build time.
    startCommand: npm start
    healthCheckPath: /api/keep-alive
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: PAYLOAD_SECRET
        sync: false
      - key: PAYLOAD_PUBLIC_SERVER_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_FROM_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
