services:
  postgres:
    image: postgres:16-alpine
    container_name: ngo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ngo
      POSTGRES_PASSWORD: ngo
      POSTGRES_DB: ngo_platform
    ports:
      - "5432:5432"
    volumes:
      - ngo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngo -d ngo_platform"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ngo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ngo_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ngo_pgdata:
  ngo_redisdata:
